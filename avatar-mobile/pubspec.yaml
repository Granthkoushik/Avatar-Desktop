name: avatar_mobile
description: "Mobile controller client for Avatar Private Ecosystem."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Utilities
  cupertino_icons: ^1.0.5
  shared_preferences: ^2.2.3
  uuid: ^4.3.3
  crypto: ^3.0.3
  encrypt: ^5.0.3

  # Networking & Video Streaming
  web_socket_channel: ^3.0.3
  http: ^1.2.0

  # Scan QR Code
  mobile_scanner: ^3.5.6

  # Voice Speech-to-Text Recognition
  speech_to_text: ^7.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1

flutter:
  uses-material-design: true

dependency_overrides:
  path_provider_foundation: 2.5.1
